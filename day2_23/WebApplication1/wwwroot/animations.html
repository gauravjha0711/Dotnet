
<!DOCTYPE html>
<html>
<head>
    <style>
        @keyframes move {
            from {
                left: 0px;
            }

            to {
                left: 200px;
            }
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: red;
            position: relative;
            animation: move 2s infinite alternate;
        }
    </style>
</head>
<body>

    <div class="box"></div>

</body>
</html>
